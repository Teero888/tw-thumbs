name: Generate Map Thumbnails

on:
  schedule:
    # Run every 3 hours to check for new commits across the map repositories
    - cron: '0 */3 * * *'
  repository_dispatch:
    types: [map_updated, ddnet_updated, unique_updated, kog_updated, generate_thumbnails]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target repository to process (all, ddnet, unique, kog)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ddnet
          - unique
          - kog
      force:
        description: 'Force re-rendering existing thumbnails'
        required: false
        default: false
        type: boolean
      resolution:
        description: 'Thumbnail resolution (widthxheight)'
        required: false
        default: '1280x720'
        type: string
      jobs:
        description: 'Number of parallel rendering jobs'
        required: false
        default: '4'
        type: string

permissions:
  contents: write

jobs:
  render-thumbnails:
    name: Render Map Thumbnails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies for Headless Rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools xvfb libgl1 python3

      - name: Cache Built Binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            bin/
            twgpu/target/release/twgpu-map-photography
            twmap/target/release/twmap-fix
          key: ${{ runner.os }}-twgpu-twmap-v1

      - name: Install Rust Toolchain
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rendering Tools
        run: |
          chmod +x scripts/build_tools.sh
          ./scripts/build_tools.sh

      - name: Generate Thumbnails
        run: |
          chmod +x scripts/process_maps.py

          TARGET="${{ github.event.inputs.target || 'all' }}"
          RESOLUTION="${{ github.event.inputs.resolution || '1280x720' }}"
          JOBS="${{ github.event.inputs.jobs || '4' }}"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          xvfb-run -a python3 scripts/process_maps.py \
            --target "$TARGET" \
            --resolution "$RESOLUTION" \
            --jobs "$JOBS" \
            $FORCE_FLAG

      - name: Commit and Push Updated Thumbnails
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated map thumbnail generation update [skip ci]"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "ddnet/** unique/** kog/** .commit_hashes.json"
